<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login :: Plataforma A</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="banner-side">
            <div class="overlay"></div>
            <img src="assets/img-login.jpeg" alt="Estudante UniSales">
        </div>

        <div class="form-side">
            <div class="form-container">
    <img src="assets/unisales-logo.png" alt="UniSales Logo" class="main-logo">
    <p class="welcome-text">Seja bem-vindo</p>
    
    <form id="loginForm">
        <div class="input-field">
            <label for="ra">Usuário (RA)</label>
            <input type="text" id="ra" placeholder="Digite seu RA" required>
        </div>
        <div class="input-field" style="position: relative;">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Digite sua senha" required>
            <span style="position: absolute; right: 15px; top: 38px; color: #64748b; cursor: pointer;">
                <iconify-icon icon="ri:eye-line"></iconify-icon>
            </span>
        </div>
        <button type="submit" class="btn-login">Entrar</button>
    </form>

    <div class="form-footer">
        <a href="#">Esqueci o usuário</a> <span style="color: #475569; font-weight: normal;">ou</span> <a href="#">Esqueci a senha</a>
    </div>
</div>
        </div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
